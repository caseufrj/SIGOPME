name: Python Check

on:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Listar arquivos
        run: |
          pwd
          ls -R

      - name: Verificar sintaxe
        run: |
          python -m compileall .
